services:
  - type: web
    name: agrishop-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js

  - type: static
    name: agrishop
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html