<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#16a34a"/>
  
  <!-- Wheat stalk -->
  <line x1="50" y1="80" x2="50" y2="20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Wheat grains left -->
  <ellipse cx="38" cy="35" rx="8" ry="5" fill="#fff" transform="rotate(-30 38 35)"/>
  <ellipse cx="36" cy="47" rx="8" ry="5" fill="#fff" transform="rotate(-25 36 47)"/>
  <ellipse cx="37" cy="59" rx="8" ry="5" fill="#fff" transform="rotate(-20 37 59)"/>
  
  <!-- Wheat grains right -->
  <ellipse cx="62" cy="35" rx="8" ry="5" fill="#fff" transform="rotate(30 62 35)"/>
  <ellipse cx="64" cy="47" rx="8" ry="5" fill="#fff" transform="rotate(25 64 47)"/>
  <ellipse cx="63" cy="59" rx="8" ry="5" fill="#fff" transform="rotate(20 63 59)"/>
  
  <!-- Top grain -->
  <ellipse cx="50" cy="24" rx="5" ry="8" fill="#fff"/>
  
  <!-- Ground line -->
  <line x1="30" y1="82" x2="70" y2="82" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Small leaves -->
  <path d="M50 70 Q35 65 33 55 Q45 58 50 70" fill="#86efac"/>
  <path d="M50 70 Q65 65 67 55 Q55 58 50 70" fill="#86efac"/>
</svg>